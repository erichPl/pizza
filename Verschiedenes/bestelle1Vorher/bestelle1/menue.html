<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Speisekarte Admin | Synchronized Full-Width</title>
    <style>




/* Die graue Einstellungs-Box kompakter machen */
.settings-box {
    background: #eee; 
    padding: 3px 8px !important; /* Weniger Innenabstand oben/unten */
    margin-bottom: 5px !important;  /* Nur noch 5px Abstand nach unten zum Menü */

}

/* Den Abstand innerhalb der Box (zwischen Überschrift und Checkbox) verringern */
.settings-box h3 {
    font-size: 1rem;

}

/* Die Zeile mit der Checkbox und dem Button */
.settings-row {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-top: 0 !important;
}

/* Den grauen Button etwas zierlicher machen, damit er nicht so hoch baut */
.btn-secondary {
    padding: 4px 10px !important;
    font-size: 12px !important;
    cursor: pointer;
}



/* 1. Den weißen Header-Kasten schrumpfen */
header { 
    background: white; 
    padding: 5px 15px !important; /* Von 15px auf 5px reduziert */

    margin-bottom: 5px !important; /* Von 15px auf 5px reduziert */

    justify-content: space-between; 
    align-items: center;

}

.header-top-row h1 {
    margin: 0 !important;

    flex-grow: 1;        /* Schiebt die Buttons nach rechts, wenn gewünscht */
}

/* 2. Den Bereich der Buttons (Neu & Speichern) kompakt machen */
.header-actions {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-bottom: 0 !important; /* Entfernt die 20px von vorher */
    padding-bottom: 0 !important; /* Entfernt die 15px von vorher */
    border-bottom: none !important; /* Entfernt die Trennlinie, die Platz fraß */
}

/* 3. Die Buttons selbst etwas flacher machen, damit sie in den schmalen Header passen */
.btn-add, .btn-save-top {
    padding: 6px 15px !important; /* Von 12px auf 6px Höhe reduziert */
    border-radius: 6px;
    margin-right: 10px;
	cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    border: none;
}

/* 4. Die Überschrift anpassen */
header h1 {
    font-size: 1.2rem !important; /* Etwas kleiner, passend zum schmalen Rahmen */
    margin: 0 !important;
}


.btn-save-top:hover {
    background: #219150;
    transform: translateY(-1px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}
.btn-save-top:active {
    transform: translateY(0);
}
	
#undo-banner {
    display: none; 
    position: fixed; 
    top: 20px; 
    right: 20px; 
    background: #27ae60; 
    color: white; 
    padding: 15px 25px; 
    border-radius: 8px; 
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    /* WICHTIG: Er muss über allem schweben */
    z-index: 999999 !important; 
    cursor: pointer; 
    font-weight: bold;
}

@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}
	
	
	
.admin-grid-row {
    display: grid !important;
    /* Deine neuen Proportionen: Name, Beschr, Zutaten, Preis */
    grid-template-columns: 1.2fr 3.5fr 3.5fr 0.8fr !important; 
    gap: 12px;
    width: 100%;

}

/* Der neue Button für das Einfügen dazwischen */
.insert-area-mini {
    background: #3498db;
    color: white;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px; cursor: pointer; font-weight: bold;
    font-size: 18px; line-height: 1;
}
.insert-area-mini:hover { background: #2980b9; }

/* Die linke Spalte braucht ein wenig mehr Platz für 3 Elemente (Ü, +, X) */
.left-action-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px; 
    width: 40px; /* Leicht verbreitert */
    flex-shrink: 0;
}
	
	
	.delete-area {
    background: #ff4444;
    color: white;
    width: 35px;
    height: 35px;
    display: flex;
    align-items: center;
    justify-content: center;

}

.delete-area:hover {

}

/* Der Container für den gesamten Block */
.content-area {
    display: flex;
    flex-direction: column; /* Stapelt top-row und row-it übereinander */
    width: 100%;
}

/* Sorgt dafür, dass die DE-Felder nebeneinander bleiben, falls gewünscht */
.row-de, .row-it {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}
	
	textarea {
    width: 100%;
    resize: none;            /* Deaktiviert die manuelle Ecke zum Ziehen */
    overflow: hidden;        /* Versteckt den Scrollbalken */
    min-height: 32px;
    font-family: inherit;
    font-size: 14px;

}

        }

}

<body>
<div id="undo-banner" onclick="undoDelete()">
    ↩️ Zeile gelöscht. Rückgängig machen?
</div>
<div class="main-container">
    <header>
        <div class="header-top-row">
            <h1>🍴 Menü-Verwaltung</h1>
            <!--div class="header-actions">-->
                <button class="btn-add" onclick="addNewRow()">+ Neues Produkt</button>
                <button class="btn-save-top" id="btn-save" onclick="saveToCloud()">💾 Speichern</button>
            <!--</div>-->
        </div>
        
        <div id="status" style="margin-bottom: 15px; font-weight: bold; color: #27ae60; min-height: 1.2em;"></div>

        <div class="settings-box">
            <!--<h3>System-Einstellungen</h3>-->
            <div class="settings-row">
                <label><input type="checkbox" id="geoCheckbox"> Geolocation-Pflicht (GPS) aktiv</label>
                <button class="btn-secondary" onclick="saveSettings()">Einstellungen speichern</button>
            </div>
        </div>
    </header>
    
    <div id="menuContainer"></div>
</div>

<script>
    async function loadData() {
        try {
            const res = await fetch('/api/order-menu');
            const items = await res.json();
            renderList(items);
			
			// In loadData nach renderList(items):
setTimeout(() => {
    document.querySelectorAll('textarea').forEach(el => autoGrow(el));
}, 100);
			
           document.getElementById('status').innerText = "✅ Daten geladen.";
        } catch (err) { document.getElementById('status').innerText = "❌ Fehler beim Laden."; }
    }

    function renderList(items) {
        const container = document.getElementById('menuContainer');
        container.innerHTML = '';
        items.forEach(item => addRow(item));
    }

    function addRow(item = {}) {
        const container = document.getElementById('menuContainer');
        const isHeader = item.type === 'header';
        const block = document.createElement('div');
        block.className = `product-block ${isHeader ? 'is-header' : ''}`;
        
   // In deiner addRow Funktion:
// Ersetze den Bereich <div class="content-area"> in deiner addRow Funktion:
// In der addRow(item = {}) Funktion:
block.innerHTML = `
    <div class="side-controls">
        <button class="btn-sort" onclick="${isHeader ? 'moveGroup(this, -1)' : 'move(this, -1)'}">↑</button>
        <button class="btn-sort" onclick="${isHeader ? 'moveGroup(this, 1)' : 'move(this, 1)'}">↓</button>
    </div>
    
    <div class="left-action-area">
        <div class="check-box-mini">
            <span class="label-tag">Ü</span>
            <input type="checkbox" class="f-type-check" onchange="toggleType(this)" ${isHeader ? 'checked' : ''}>
        </div>
        <div class="insert-area-mini" onclick="insertAfterMe(this)" title="Darunter einfügen">+</div>
        <div class="delete-area-mini" onclick="deleteMe(this)" title="Löschen">✕</div>
    </div>

    <div class="content-area">
        <div class="admin-grid-row row-de">
            <div class="f-group"><span class="label-tag">Name (DE)</span><textarea class="f-name" oninput="autoGrow(this)" rows="1">${item.name || ''}</textarea></div>
            <div class="f-group"><span class="label-tag">Beschreibung (DE)</span><textarea class="f-desc" oninput="autoGrow(this)" rows="1">${item.desc || ''}</textarea></div>
            <div class="f-group"><span class="label-tag">Zutaten (DE)</span><textarea class="f-ingredients" oninput="autoGrow(this)" rows="1">${item.ingredients || ''}</textarea></div>
            <div class="f-group"><span class="label-tag">Preis (€)</span><input type="text" class="f-price" value="${item.price || ''}"></div>
        </div>

        <div class="admin-grid-row row-it">
            <div class="f-group"><span class="label-tag">Name (IT)</span><textarea class="f-name_it" oninput="autoGrow(this)" rows="1">${item.name_it || ''}</textarea></div>
            <div class="f-group"><span class="label-tag">Beschreibung (IT)</span><textarea class="f-desc_it" oninput="autoGrow(this)" rows="1">${item.desc_it || ''}</textarea></div>
            <div class="f-group"><span class="label-tag">Zutaten (IT)</span><textarea class="f-ingredients_it" oninput="autoGrow(this)" rows="1">${item.ingredients_it || ''}</textarea></div>
            <div class="f-group">
                <div style="display: flex; gap: 5px; width: 100%;">
                    <div style="flex: 1;"><span class="label-tag">View</span><input type="text" class="f-view" value="${item.view || 'b'}" style="text-align:center;"></div>
                    <div style="flex: 1; display:flex; flex-direction:column; align-items:center;"><span class="label-tag">Sicht</span><input type="checkbox" class="f-visible" ${item.hidePrice === true ? '' : 'checked'}></div>
                </div>
            </div>
        </div>
    </div>
`;
        container.appendChild(block);
    }

    function toggleType(cb) { cb.closest('.product-block').classList.toggle('is-header', cb.checked); }
    function move(btn, dir) {
        const block = btn.closest('.product-block');
        if (dir === -1 && block.previousElementSibling) block.parentNode.insertBefore(block, block.previousElementSibling);
        else if (dir === 1 && block.nextElementSibling) block.parentNode.insertBefore(block.nextElementSibling, block);
    }
	
    // Diese Variablen müssen AUẞERHALB der Funktion stehen (global)
let deleteTimeout = null;

let lastDeletedItem = null;
let lastDeletedPosition = null;

function deleteMe(el) {
    const block = el.closest('.product-block');
    if (!block) return;

    if (!confirm('Wirklich löschen?')) return;

    // 1. Position merken (das Element DANACH)
    lastDeletedPosition = block.nextSibling;
    // 2. Das Element klonen oder Referenz speichern
    lastDeletedItem = block;
    
    // 3. Aus dem HTML entfernen (statt nur verstecken)
    block.remove(); 
    
    // 4. Banner anzeigen
    const banner = document.getElementById('undo-banner');
    if (banner) {
        banner.style.display = 'block';
        
        // Nach 10 Sekunden den Speicher für das gelöschte Item leeren
        if (window.deleteTimeout) clearTimeout(window.deleteTimeout);
        window.deleteTimeout = setTimeout(() => {
            banner.style.display = 'none';
            lastDeletedItem = null; 
        }, 10000);
    }
}

function undoDelete() {
    if (lastDeletedItem) {
        const container = document.getElementById('menuContainer');
        
        // Wieder an der alten Stelle einfügen
        if (lastDeletedPosition) {
            container.insertBefore(lastDeletedItem, lastDeletedPosition);
        } else {
            // Falls es das letzte Element war
            container.appendChild(lastDeletedItem);
        }
        
        // Banner sofort weg
        document.getElementById('undo-banner').style.display = 'none';
        
        // WICHTIG: Falls scrollen nötig ist
        lastDeletedItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
        
        lastDeletedItem = null;
        if (window.deleteTimeout) clearTimeout(window.deleteTimeout);
    }
}
	
    function addNewRow() { addRow({ type: 'product', view: 'b' }); window.scrollTo(0, document.body.scrollHeight); }

    async function saveToCloud() {
        const blocks = document.querySelectorAll('.product-block');
        const items = Array.from(blocks).map(b => ({
            type: b.querySelector('.f-type-check').checked ? 'header' : 'product',
            name: b.querySelector('.f-name').value,
            desc: b.querySelector('.f-desc').value,
            ingredients: b.querySelector('.f-ingredients').value,
            price: b.querySelector('.f-price').value,
            name_it: b.querySelector('.f-name_it').value,
            desc_it: b.querySelector('.f-desc_it').value,
            ingredients_it: b.querySelector('.f-ingredients_it').value,
            view: b.querySelector('.f-view').value,
            hidePrice: !b.querySelector('.f-visible').checked
        }));
        try {
            const res = await fetch('/api/order-menu', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ items }) });
            if (res.ok) alert("Gespeichert!");
        } catch (err) { alert("Fehler!"); }
    }
	
	
	// Beim Laden der Admin-Seite den aktuellen Status holen
	async function loadSettings() {
		const res = await fetch('/api/get-settings');
		const data = await res.json();
		document.getElementById('geoCheckbox').checked = data.isGeolocation;
	}

	async function saveSettings() {
		const isActive = document.getElementById('geoCheckbox').checked;
		const res = await fetch('/api/save-settings', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json' },
			body: JSON.stringify({ isGeolocation: isActive })
		});
		if (res.ok) alert("Einstellungen gespeichert!");
	}

function moveGroup(btn, dir) {
    const headerBlock = btn.closest('.product-block');
    const parent = headerBlock.parentNode;
    
    // 1. Alle Elemente dieser Gruppe finden (Header + Produkte darunter)
    let group = [headerBlock];
    let next = headerBlock.nextElementSibling;
    while (next && !next.classList.contains('is-header')) {
        group.push(next);
        next = next.nextElementSibling;
    }

    if (dir === -1) { // NACH OBEN
        const prevHeader = headerBlock.previousElementSibling;
        if (!prevHeader) return; // Schon ganz oben

        // Wir müssen den Header der Gruppe davor finden
        let targetHeader = prevHeader;
        while (targetHeader.previousElementSibling && !targetHeader.classList.contains('is-header')) {
            targetHeader = targetHeader.previousElementSibling;
        }
        // Ganze Gruppe vor diesen Ziel-Header schieben
        group.forEach(el => parent.insertBefore(el, targetHeader));
        
    } else { // NACH UNTEN
        // Finde das Ende der aktuellen Gruppe
        let lastOfGroup = group[group.length - 1];
        let nextHeader = lastOfGroup.nextElementSibling;
        
        if (!nextHeader) return; // Schon ganz unten

        // Finde das Ende der NÄCHSTEN Gruppe
        let nextGroupEnd = nextHeader;
        while (nextGroupEnd.nextElementSibling && !nextGroupEnd.nextElementSibling.classList.contains('is-header')) {
            nextGroupEnd = nextGroupEnd.nextElementSibling;
        }
        
        // Verschiebe die aktuelle Gruppe hinter das Ende der nächsten Gruppe
        group.reverse().forEach(el => {
            parent.insertBefore(el, nextGroupEnd.nextElementSibling);
        });
    }
    headerBlock.scrollIntoView({ behavior: 'smooth', block: 'center' });
}


function autoGrow(element) {
    element.style.height = "5px"; // Kurz verkleinern, um die Scrollhöhe neu zu berechnen
    element.style.height = (element.scrollHeight) + "px";
}



function insertAfterMe(el) {
    const currentBlock = el.closest('.product-block');
    // Wir rufen einfach addRow auf, aber wir hängen es nicht an das Ende an
    const newItem = { type: 'product', view: 'b', name: '', desc: '', price: '' };
    
    // Temporäres Div zum Generieren des Blocks nutzen
    const tempDiv = document.createElement('div');
    // Wir speichern den aktuellen Container-Zustand kurz
    const container = document.getElementById('menuContainer');
    
    // Da addRow normalerweise appendChild nutzt, machen wir es hier manuell:
    addRow(newItem); 
    const newBlock = container.lastElementChild; // Das gerade erstellte Element nehmen
    
    // Und nun an die richtige Stelle schieben (nach dem aktuellen Block)
    currentBlock.parentNode.insertBefore(newBlock, currentBlock.nextSibling);
    
    // UI-Fokus und AutoGrow
    setTimeout(() => {
        newBlock.scrollIntoView({ behavior: 'smooth', block: 'center' });
