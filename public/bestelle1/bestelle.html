    <style>	

body::after {
    content: "";
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 50px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    pointer-events: none; /* Man kann durch den Schatten klicken */
    z-index: 1500; /* Liegt über dem Menü, aber unter dem Warenkorb */
}



/* 1. Breite des Scrollbalkens (für PC und Chrome/Safari) */
::-webkit-scrollbar {
    width: 10px; /* Breite des vertikalen Balkens */
    height: 10px; /* Höhe des horizontalen Balkens (falls vorhanden) */
}

/* 2. Der Hintergrund (die Schiene), auf der der Balken läuft */
::-webkit-scrollbar-track {
    background: #2a2a2a; /* Dunkles Grau, damit es zum Design passt */
    border-radius: 10px;
}

/* 3. Der bewegliche Teil (der "Griff") */
::-webkit-scrollbar-thumb {
    background: #666; /* Hellere Farbe für bessere Sichtbarkeit */
    border-radius: 10px;
    border: 2px solid #2a2a2a; /* Erzeugt einen kleinen Abstand zum Rand */
}

/* 4. Farbe ändern, wenn man mit der Maus drüberfährt (PC) */
::-webkit-scrollbar-thumb:hover {
    background: #888; 
}

/* Spezial-Regel für Firefox */
* {
    scrollbar-width: auto;
    scrollbar-color: #666 #2a2a2a;
}




/* Standardmäßig fast unsichtbar oder sehr dezent */
::-webkit-scrollbar-thumb {
    background: rgba(102, 102, 102, 0.2); 
    border-radius: 10px;
}

/* Sobald der Finger auf dem Schirm ist -> Hell und deutlich! */
.is-touching ::-webkit-scrollbar-thumb {
    background: #888 !important; /* Kräftiges Grau */
    border: 2px solid #2a2a2a;
}

/* Die Schiene kann auch leicht aufleuchten */
.is-touching ::-webkit-scrollbar-track {
    background: #222 !important;
}

/* Für die gesamte Seite */
.is-touching {
    scrollbar-color: #888 #222; /* Firefox Support */
}

/* Warenkorb Leiste - EXTREM KOMPAKT & HOCH */
.cart-bar { 
    position: fixed; 
    bottom: 0; 
    left: 0; 
    right: 0; 
    background: #1e1e1e; 
    
    /* Zwingt den Warenkorb auf 75% der Bildschirmhöhe */
    max-height: 75vh !important; 
    height: auto;
    
    /* Null Abstand nach oben zur grünen Linie */
    padding: 0 12px 10px 12px !important; 
    border-top: 3px solid #00ca4e; 
    box-shadow: 0 -8px 25px rgba(0,0,0,0.7); 
    z-index: 2000; 
    
    display: none; /* Steuerung via JS */
    overflow-y: auto; 
    -webkit-overflow-scrolling: touch; 
}

/* Den ersten Inhalt (Zusammenfassung/Produkte) direkt an die Linie ziehen */
.cart-bar > *:first-child {
    margin-top: 0 !important;
    padding-top: 4px !important; /* Nur ein winziger optischer Hauch */
}

/* Falls du h3/p im Warenkorb nutzt, auch hier Abstände killen */
.cart-bar h3, .cart-bar h4, .cart-bar p {
    margin-top: 0 !important;
    margin-bottom: 5px !important;
    padding-top: 0 !important;
}

/* Warenkorb-Zeilen noch flacher */
.cart-row { 
    background: #2a2a2a; 
    margin-top: 0;
    margin-bottom: 4px; /* Noch enger zusammen */
    padding: 6px 8px;   /* Weniger Innenabstand */
    border-radius: 4px; 
    border-left: 4px solid #ffcc00; 
}
        
.cart-header { 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    gap: 4px; /* Von 8px auf 4px reduziert, um mehr Platz für langen Text zu haben */
    width: 100%;
}

/* Optional: Damit der Name der Pizza nicht die Buttons wegdrückt */
.cart-header span:first-child {
    overflow: hidden;
    text-overflow: ellipsis; /* Macht "..." falls der Name zu lang ist */
    white-space: nowrap;
    flex-grow: 1;
}

	.btn-del-square {

    display: flex; 
    align-items: center; 
    justify-content: center; 
    font-weight: bold; 
    cursor: pointer; 
    font-size: 0.75rem;        /* Kleinere Schrift/Icon */
    transition: all 0.2s;      /* Sanfter Übergang beim Klicken */
}

/* Beim Draufklicken oder Hover (PC) wird es leicht rötlich */
.btn-del-square:active {
    background: #602020;       /* Ganz dunkles Weinrot nur bei Interaktion */
    color: #ff4444;
}

		}

.btn-send { 
    background: #00ca4e;    /* Dein originales Grün */
    color: white; 
    width: 100%; 
    padding: 2px 0 !important; /* Etwas mehr als 2px, aber viel weniger als die alten 18px */
    border: none; 
    font-weight: bold; 
    border-radius: 4px;      /* Die gewohnte Abrundung */
    font-size: 1.1rem;       /* Schöne, deutliche Schrift */
    cursor: pointer; 
    margin-top: 2px; 
    box-shadow: 0 4px 4px rgba(0, 202, 78, 0.3); /* Ein leichter grüner Schatten für den Look */
    text-transform: uppercase; /* Sieht oft professioneller aus */
    line-height: 1.2;
}

/* Kleiner Effekt beim Draufklicken */
.btn-send:active {
    background: #00a841;
    transform: scale(0.98);
}		
		
		
		
        /* Modal */
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:4000; padding:20px; box-sizing: border-box; }
        .modal-content { background:#222; max-width:500px; margin:20px auto; padding:20px; border-radius:15px; border:1px solid #444; }
        .opt-btn { color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer; font-weight:bold; font-size:0.8rem; margin-right:8px; margin-top:10px; }
		
		
		/* Button-Styles für das Modal */
		.modal-btn {
			display: block; width: 100%; padding: 12px; margin: 8px 0; 
			background: #333; color: white; border: none; border-radius: 8px; 
			text-align: left; cursor: pointer; font-weight: bold;
		}
		/* Aktiv-Farbe für EXTRAS (Grün) */
		.modal-btn.active-add { background: #27ae60 !important; border: 2px solid #fff; }
		/* Aktiv-Farbe für OHNE (Gold/Orange) */
		.modal-btn.active-remove { background: #f39c12 !important; border: 2px solid #fff; }

		
		
	/* Kompakter Header für Mobile */
#menu h2 {
    margin-top: 10px !important;    /* Weniger Platz nach oben */

}

/* Der Container um die Header-Zeile */
