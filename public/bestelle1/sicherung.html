<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza-Backup System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f1e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h2 { color: #e94560; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: #aaa; }
        
        input[type="password"], input[type="file"] {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #16213e;
            background: #0f0f1e;
            color: white;
            box-sizing: border-box;
            outline: none;
        }
        input[type="password"]:focus { border-color: #e94560; }

        .selection-group {
            text-align: left;
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px solid #0f3460;
        }
        .selection-group strong { display: block; margin-bottom: 10px; color: #e94560; }
        .selection-group label {
            display: flex;
            align-items: center;
            margin: 10px 0;
            cursor: pointer;
            color: white;
            font-size: 1em;
        }
        .selection-group input { margin-right: 12px; width: 18px; height: 18px; cursor: pointer; }

        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-backup { background: #0f3460; color: white; }
        .btn-backup:hover { background: #16213e; transform: translateY(-2px); }
        
        .btn-restore { background: #e94560; color: white; margin-top: 20px; }
        .btn-restore:hover { background: #ff4d6d; transform: translateY(-2px); }
        
        #status { 
            margin-top: 20px; 
            padding: 10px; 
            border-radius: 6px; 
            font-size: 0.9em; 
            display: none; 
        }
        .success { background: rgba(76, 175, 80, 0.2); color: #4caf50; display: block !important; border: 1px solid #4caf50; }
        .error { background: rgba(244, 67, 54, 0.2); color: #f44336; display: block !important; border: 1px solid #f44336; }
        
        hr { border: 0; border-top: 1px solid #0f3460; margin: 25px 0; }
    </style>
</head>
<body>

<div id="loginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0f0f1e; z-index:9999; display:flex; justify-content:center; align-items:center; flex-direction:column;">
    <div class="container" style="max-width:350px; border: 2px solid #e94560;">
        <h2>🔐 Admin Bereich</h2>
        <p style="color: #aaa; font-size: 0.9rem;">Bitte Passwort eingeben, um fortzufahren.</p>
        <input type="password" id="mainLoginPw" placeholder="Passwort..." 
               style="width:100%; padding:12px; margin: 15px 0; background:#000; color:#fff; border:1px solid #16213e; border-radius:6px;">
        <button class="btn btn-restore" onclick="validateAdminLogin()">Zugreifen</button>
        <p id="loginErrorMsg" style="color:#ff4b2b; display:none; margin-top:15px; font-weight:bold;">❌ Passwort falsch!</p>
    </div>
</div>

<div class="container">
    <h2>Sicherung & Restore</h2>
   
    
    <div class="selection-group">
        <strong>Daten auswählen:</strong>
        <label><input type="checkbox" id="checkPizzas" checked> Speisekarte (pizzadatas)</label>
        <label><input type="checkbox" id="checkOrders" checked> Bestellungen (orders)</label>
        <label><input type="checkbox" id="checkMenu" checked> Menü-Struktur (ordermenus)</label>
        <label><input type="checkbox" id="checkTest1" checked> Test-Daten (test1)</label>
    </div>

    <button class="btn btn-backup" onclick="startBackup()">
        <span>📥</span> Backup Downloaden
    </button>
    
    <hr>
    
    <div class="input-group" style="text-align: center;">
        <label style="text-align: center; display: block;">Backup-Datei hochladen (.json)</label>
        <input type="file" id="restoreFile" accept=".json">
    </div>
    <button class="btn btn-restore" onclick="startRestore()">
        <span>📤</span> Restore einspielen
    </button>

    <div id="status"></div>
</div>

<script>
// Variable, um das Passwort für spätere Backup-Aktionen zu behalten
let verifiedPassword = "";


    const statusDiv = document.getElementById('status');

    function showStatus(msg, isError = false) {
        statusDiv.innerHTML = msg;
        statusDiv.className = isError ? 'error' : 'success';
    }

    async function startBackup() {
        const pw = verifiedPassword;
        if (!pw) { alert("Bitte Passwort eingeben!"); return; }

        showStatus("Backup wird generiert...");

        try {
            // Wir holen zuerst alle Daten vom Server
            const response = await fetch(`/api/backup-full?pw=${pw}`);
            
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(errText || "Zugriff verweigert");
            }

            const allData = await response.json();
            
            // Jetzt filtern wir das JSON im Browser, basierend auf den Checkboxen
            const filteredData = {
                exportDatum: new Date().toISOString(),
                herkunft: "Pizza-System-Sicherung"
            };

            if (document.getElementById('checkPizzas').checked) filteredData.pizzadatas = allData.pizzadatas;
            if (document.getElementById('checkOrders').checked) filteredData.orders = allData.orders;
            if (document.getElementById('checkMenu').checked) filteredData.ordermenus = allData.ordermenus;
            if (document.getElementById('checkTest1').checked) filteredData.test1 = allData.test1;

            // Datei-Download für den User starten
            const blob = new Blob([JSON.stringify(filteredData, null, 2)], { type: 'application/json' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            const dateStr = new Date().toISOString().slice(0,10);
            
            a.href = url;
            a.download = `PizzaBackup_${dateStr}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            showStatus("Backup erfolgreich erstellt!");
        } catch (err) {
            showStatus(err.message, true);
        }
    }

    async function startRestore() {
        const pw = verifiedPassword;
        const fileInput = document.getElementById('restoreFile');
        
        if (!pw) { alert("Bitte Passwort eingeben!"); return; }
        if (!fileInput.files[0]) { alert("Bitte eine JSON-Datei auswählen!"); return; }

        const confirmMsg = "ACHTUNG: Dies überschreibt die vorhandenen Daten in den gewählten Kollektionen unwiderruflich. Fortfahren?";
        if (!confirm(confirmMsg)) return;

        showStatus("Lese Datei ein...");

        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const jsonData = JSON.parse(e.target.result);
                
                showStatus("Sende Daten zum Server...");

                const response = await fetch(`/api/restore-full?pw=${pw}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(jsonData)
                });

                const result = await response.json();
                
                if (response.ok) {
                    showStatus("ERFOLG: " + (result.status || "Daten wiederhergestellt"));
                } else {
                    throw new Error(result.error || "Server hat den Restore abgelehnt");
                }
            } catch (err) {
                showStatus("Restore Fehler: " + err.message, true);
            }
        };
        reader.readAsText(fileInput.files[0]);
    }
	
	
	async function validateAdminLogin() {
    const inputPw = document.getElementById('mainLoginPw').value;
    const errorMsg = document.getElementById('loginErrorMsg');

    try {
        // Wir schicken das Passwort zum Server zum Abgleich mit .env
        const response = await fetch('/api/sicherung-login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: inputPw })
        });

        const result = await response.json();

        if (result.success) {
            // Erfolg: Overlay weg, Seite frei!
            verifiedPassword = inputPw; // Für Backup-Requests speichern
            document.getElementById('loginOverlay').style.display = 'none';
        } else {
            // Fehler: Nachricht zeigen
            errorMsg.style.display = 'block';
            document.getElementById('mainLoginPw').value = ""; // Feld leeren
        }
    } catch (err) {
        alert("Verbindung zum Server fehlgeschlagen.");
    }
}

// Erlaube "Enter" Taste zum Einloggen
document.getElementById('mainLoginPw')?.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') validateAdminLogin();
});
	
	
	
	
	
	
	
	
</script>

</body>
</html>
