<!DOCTYPE html><html><head><title>Hardware-Aktivierung</title><style>body{font-family:sans-serif;text-align:center;padding-top:50px;}.box{border:2px solid#333;display:inline-block;padding:20px;border-radius:10px;}
input{padding:10px;width:250px;display:block;margin:10px auto;}
button{padding:10px 20px;cursor:pointer;background:#28a745;color:white;border:none;}</style></head><body><div class="box"><h2>PC für Bar autorisieren</h2><p>Geben Sie den Master-Key ein:</p><button onclick="pcDeaktivieren()"style="background-color: #dc3545; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">Diesen PC deaktivieren</button><input type="password"id="masterKey"placeholder="Geheimer Schlüssel"><button onclick="setup()">Diesen PC aktivieren</button><p id="status"></p></div><script>function setup(){const key=document.getElementById('masterKey').value;if(key){localStorage.setItem('orderId',key);document.getElementById('status').innerText="✅ PC erfolgreich aktiviert!";document.getElementById('status').style.color="green";}}
function pcDeaktivieren(){if(confirm("Möchtest du diesen PC wirklich für Bar-Bestlellungsempfang sperren? Du musst danach den Chef-Key neu eingeben.")){localStorage.removeItem('OrderId');alert("PC wurde erfolgreich deaktiviert.");window.location.reload();}}</script></body></html>
