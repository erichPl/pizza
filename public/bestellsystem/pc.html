<!DOCTYPE html><html><head><title>Hardware-Aktivierung</title><style>body{font-family:sans-serif;text-align:center;padding-top:50px;}.box{border:2px solid#333;display:inline-block;padding:20px;border-radius:10px;}
input{padding:10px;width:250px;display:block;margin:10px auto;}
button{padding:10px 20px;cursor:pointer;color:white;border:none;border-radius:5px;font-weight:bold;}.btn-activate{background:#28a745;margin-top:10px;}.btn-deactivate{background:#dc3545;margin-bottom:20px;}.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:5px;}</style></head><body><div class="box"><h2>PC für Bar autorisieren</h2><p id="currentStatus"style="font-size: 0.85rem; color: #666; margin-bottom: 20px;"></p><p style="font-size: 0.9rem; font-weight: bold;">Passwort eingeben:</p><input type="password"id="masterKey"placeholder="Geheimer Schlüssel"><div style="display: flex; gap: 10px; justify-content: center;"><button onclick="handleAction('deactivate')"class="btn-deactivate">PC deaktivieren</button><button onclick="handleAction('activate')"class="btn-activate">PC aktivieren</button></div><p id="status"style="margin-top: 15px;"></p></div><script>window.onload=function(){updateStatusUI();};function updateStatusUI(){const hasKey=localStorage.getItem('orderId');const statusEl=document.getElementById('currentStatus');if(hasKey){statusEl.innerHTML='<span class="status-dot" style="background: #28a745;"></span> Status: <b>AKTIVIERT</b>';}else{statusEl.innerHTML='<span class="status-dot" style="background: #dc3545;"></span> Status: <b>DEAKTIVIERT</b>';}}
async function handleAction(type){const pw=document.getElementById('masterKey').value;const statusMsg=document.getElementById('status');if(!pw){alert("Bitte Passwort eingeben!");return;}
if(type==='deactivate'&&!confirm("Möchtest du diesen PC wirklich sperren?")){return;}
try{const response=await fetch('/api/verify-chef-setup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});const data=await response.json();if(data.success){if(type==='activate'){localStorage.setItem('orderId',data.deviceKey);statusMsg.innerText="✅ PC erfolgreich aktiviert!";statusMsg.style.color="green";}else{localStorage.removeItem('orderId');statusMsg.innerText="🚫 PC wurde deaktiviert!";statusMsg.style.color="red";}
document.getElementById('masterKey').value="";updateStatusUI();setTimeout(()=>window.location.reload(),1200);}else{statusMsg.innerText="❌ Passwort falsch!";statusMsg.style.color="red";}}catch(err){statusMsg.innerText="⚠️ Serverfehler!";statusMsg.style.color="orange";}}</script></body></html>
