<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-Code Generator für Tische</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .controls { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .controls input { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        .qr-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; background: white; padding: 20px; }
        .qr-item { text-align: center; border: 1px solid #eee; padding: 10px; page-break-inside: avoid; }
        .qr-item p { margin-top: 10px; font-weight: bold; font-size: 1.2em; }
        
        @media print {
            .controls, h1 { display: none; }
            body { background: white; padding: 0; }
            .qr-container { box-shadow: none; }
        }
        button { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

    <h1>QR-Code Generator</h1>

    <div class="controls">
        <label>Basis-URL: </label>
        <input type="text" id="baseUrl" value="sisinius.it/gast" style="width: 250px;"><br>
        
        <label>QR-Größe (px): </label>
        <input type="number" id="qrSize" value="200" step="50"><br>
        
        <label>Tische / Räume (z.B. 1-5, Raum1, 8, 10-12): </label>
        <input type="text" id="tableInput" placeholder="3-5, 8, Lounge" style="width: 300px;"><br>
        
        <button onclick="generateQRs()">QR-Codes generieren</button>
        <button onclick="window.print()" style="background: #007bff;">Drucken / PDF</button>
    </div>

    <div id="qr-output" class="qr-container">
        </div>

    <script>
        function parseRange(input) {
            const parts = input.split(',').map(p => p.trim());
            let results = [];

            parts.forEach(part => {
                if (part.includes('-')) {
                    const range = part.split('-');
                    const start = parseInt(range[0]);
                    const end = parseInt(range[1]);
                    if (!isNaN(start) && !isNaN(end)) {
                        for (let i = start; i <= end; i++) results.push(i.toString());
                    }
                } else if (part !== "") {
                    results.push(part);
                }
            });
            return results;
        }

        function generateQRs() {
            const baseUrl = document.getElementById('baseUrl').value;
            const size = parseInt(document.getElementById('qrSize').value);
            const input = document.getElementById('tableInput').value;
            const output = document.getElementById('qr-output');
            
            output.innerHTML = ""; // Altes löschen
            const tables = parseRange(input);

            tables.forEach(tisch => {
                // Container für einen QR-Code
                const wrapper = document.createElement('div');
                wrapper.className = 'qr-item';
                
                const qrDiv = document.createElement('div');
                wrapper.appendChild(qrDiv);
                
                const label = document.createElement('p');
                label.innerText = "Tisch / Ort: " + tisch;
                wrapper.appendChild(label);
                
                output.appendChild(wrapper);

                // URL zusammenbauen
                const fullUrl = `https://${baseUrl}?tisch=${encodeURIComponent(tisch)}`;

                // QR-Code generieren
                new QRCode(qrDiv, {
                    text: fullUrl,
                    width: size,
                    height: size,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            });
        }
    </script>
</body>
</html>
