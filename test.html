<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Render Test</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; shadow: 0 4px 6px rgba(0,0,0,0.1); display: inline-block; }
        #status { font-weight: bold; color: #e67e22; }
        button { padding: 10px 20px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚀 GitHub Pages Test</h1>
        <p>Wenn du das siehst, funktioniert das Rendering!</p>
        <hr>
        <p>GPS-Status: <span id="status">Warte auf Klick...</span></p>
        <button onclick="testGPS()">Standort testen</button>
    </div>

    <script>
        function testGPS() {
            const status = document.getElementById('status');
            status.innerText = "Suche...";

            if (!navigator.geolocation) {
                status.innerText = "Nicht unterstützt (Kein Browser-Support)";
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    status.style.color = "#27ae60";
                    status.innerText = `Gefunden! Lat: ${pos.coords.latitude.toFixed(4)}`;
                },
                (err) => {
                    status.style.color = "#c0392b";
                    status.innerText = "Fehler: " + err.message;
                }
            );
        }
    </script>
</body>
</html>
